<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Map SVG</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f7fb;
        font-family: Arial, sans-serif;
      }

      .map-card {
        width: min(900px, 94vw);
        background: white;
        border-radius: 32px;
        padding: 24px;
        box-shadow: 0 18px 45px rgba(20, 30, 60, 0.12);
      }

      svg {
        width: 100%;
        height: auto;
        display: block;
      }

      .map-frame {
        fill: #ffffff;
        stroke: #d7deea;
        stroke-width: 3;
      }

      .line {
        fill: none;
        stroke-width: 18;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .line-blue {
        stroke: #2563eb;
      }
      .line-green {
        stroke: #22c55e;
      }
      .line-red {
        stroke: #ef4444;
      }

      .station {
        fill: white;
        stroke: #111827;
        stroke-width: 5;
      }

      .interchange {
        fill: white;
        stroke: #111827;
        stroke-width: 6;
      }

      .label {
        font-size: 22px;
        font-weight: 700;
        fill: #111827;
      }

      .small-label {
        font-size: 15px;
        font-weight: 600;
        fill: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="map-card">
      <svg
        viewBox="0 0 900 520"
        role="img"
        aria-label="Mappa metropolitana con tre linee vicine e tre stazioni ciascuna"
      >
        <!-- Rettangolo con bordi rotondi -->
        <rect
          x="40"
          y="40"
          width="820"
          height="440"
          rx="44"
          class="map-frame"
        />

        <!-- Tre linee vicine -->
        <path class="line line-blue" d="M 180 210 H 720" />
        <path class="line line-green" d="M 180 260 H 720" />
        <path class="line line-red" d="M 180 310 H 720" />

        <!-- Nodo di scambio (tipo sottopassaggio verticale) -->
        <path
          class="line"
          d="M 450 210 V 310"
          stroke="#111827"
          stroke-width="10"
        />

        <!-- Solo nodo di scambio su tutte le linee -->
        <circle cx="450" cy="210" r="20" class="interchange" />
        <circle cx="450" cy="260" r="20" class="interchange" />
        <circle cx="450" cy="310" r="20" class="interchange" />

        <!-- Nodo centrale evidenziato -->
        <circle cx="450" cy="260" r="10" fill="#111827" />
        <circle cx="450" cy="260" r="10" fill="#111827" />

        <!-- Etichette stazioni -->
        <text x="322" y="165" class="label">Stazione 1</text>
        <text x="412" y="165" class="label">Stazione 2</text>
        <text x="502" y="165" class="label">Stazione 3</text>

        <!-- Nomi linee -->
        <text x="95" y="218" class="small-label">Linea Blu</text>
        <text x="95" y="268" class="small-label">Linea Verde</text>
        <text x="95" y="318" class="small-label">Linea Rossa</text>

        <!-- Nota -->
        <text x="300" y="390" class="small-label">
          Tre linee, tre stazioni ciascuna, tutte ravvicinate
        </text>
      </svg>
    </div>
  </body>
</html>
